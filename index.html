<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 50px auto; padding: 0 20px; }
        .login-box { max-width: 300px; margin: 100px auto; padding: 20px; border: 1px solid #eee; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <!-- 登录页 -->
    <div id="login">
        <div class="login-box">
            <h2>管理员登录</h2>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="login()">登录</button>
        </div>
    </div>

        <table>
          <thead>

              <th>编号</th>
              <th>姓名</th>
              <th>电话</th>
              <th>地址</th>
              <th>操作</th>
            </tr>
          </thead>

            </tr>

              <td>李四</td>

              <td>深圳市南山区科技园</td>
              <td><button onclick="deleteOrder(this)">删除</button></td>
            </tr>
            <tr>
              <td>3</td>
              <td>王五</td>
              <td>13700137000</td>
              <td>杭州市西湖区</td>
              <td><button onclick="deleteOrder(this)">删除</button></td>
            </tr>
          </tbody>
        </table>
        <br>
        <button onclick="logout()">退出登录</button>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            if(user === 'admin' && pwd === '123456') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('admin').style.display = 'block';
            } else {
                alert('用户名或密码错误');
            }
        }
