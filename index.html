<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的后台系统</title>
    <style>
        body{text-align:center;margin-top:50px;}
        .box{width:300px;margin:0 auto;padding:20px;border:1px solid #ccc;border-radius:8px;}
        input{width:90%;padding:10px;margin:10px 0;}
        button{padding:10px 30px;background:#007bff;color:#fff;border:none;border-radius:5px;}
        #admin{display:none;}
    </style>
</head>
<body>
    <div class="box" id="loginBox">
        <h3>后台登录</h3>
        <input type="password" id="pwd" placeholder="请输入密码">
        <button onclick="login()">登录</button>
    </div>

    <div id="admin">
       <h3>📋 订单管理列表</h3>
<table border="1" cellpadding="8" cellspacing="0" width="100%">
  <tr bgcolor="#eee">
    <td>编号</td>
    <td>姓名</td>
    <td>电话</td>
    <td>地址</td>
    <td>操作</td>
  </tr>
  <tr>
    <td>1</td>
    <td>张三</td>
    <td>13800138000</td>
    <td>广东省广州市</td>
    <td><button>删除</button></td>
  </tr>
  <tr>
    <td>2</td>
    <td>李四</td>
    <td>13900139000</td>
    <td>深圳市南山区</td>
    <td><button>删除</button></td>
  </tr>
</table>

<br>
<button onclick="logout()">退出登录</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
