<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINAMALL 采购订单系统</title>
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部标题 -->
    <div class="header-title">
        <span class="cart-icon">🛒</span>
        <h1>CHINAMALL</h1>
    </div>

    <!-- 采购订单录入 -->
    <div class="card">
        <div class="card-title">
            <span>📝</span>
            <span>采购订单录入</span>
        </div>
        <div class="form-row">
            <input type="date" class="form-input" value="2026-05-15" id="orderDate">
            <select class="form-input" id="platformSelect">
                <option value="1688">1688</option>
            </select>
        </div>
        <div class="form-row">
            <input type="text" class="form-input" placeholder="客户姓名" id="customerName">
            <input type="text" class="form-input" placeholder="联系电话" id="customerPhone">
            <input type="text" class="form-input" placeholder="客户地址" id="customerAddress">
        </div>
        <div class="form-row">
            <input type="text" class="form-input" placeholder="采购订单号" id="purchaseOrderNo">
            <input type="text" class="form-input" placeholder="订单序号" id="orderSerialNo">
            <input type="text" class="form-input" placeholder="快递单号" id="expressNo">
        </div>
        <div class="form-row">
            <button class="btn-save" id="saveBtn">保存录入</button>
        </div>
    </div>

    <!-- 综合查询 -->
    <div class="card">
        <div class="card-title">
            <span>🔍</span>
            <span>综合查询（姓名/电话/地址/序号/采购号/快递号）</span>
        </div>
        <div class="search-area">
            <input type="text" class="search-input" placeholder="输入任意关键词搜索" id="searchKeyword">
            <button class="btn-search" id="searchBtn">查询</button>
            <button class="btn-upload">上传图片绑定</button>
        </div>
    </div>

    <!-- 全部订单记录 -->
    <div class="card">
        <div class="card-title">
            <span>📋</span>
            <span>全部订单记录</span>
        </div>
        <table class="order-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>序号</th>
                    <th>姓名</th>
                    <th>电话</th>
                    <th>地址</th>
                    <th>快递单号</th>
                    <th>物流公司</th>
                    <th>采购单号</th>
                    <th>采购平台</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="orderTableBody">
                <!-- 数据行由JS动态添加 -->
            </tbody>
        </table>
    </div>

    <!-- 引入外部JS文件 -->
    <script src="script.js"></script>
</body>
</html>
